# ============================================
# Buranto Intranet — Nginx Reverse Proxy
# Lokales Netzwerk mit Self-Signed SSL
# ============================================

# HTTP → HTTPS Redirect
server {
    listen 80;
    server_name intranet.buranto.local 192.168.1.235;
    return 301 https://$host$request_uri;
}

# HTTPS Server
server {
    listen 443 ssl;
    server_name intranet.buranto.local 192.168.1.235;

    # SSL Zertifikate (self-signed für lokales Netzwerk)
    ssl_certificate     /etc/nginx/ssl/buranto.crt;
    ssl_certificate_key /etc/nginx/ssl/buranto.key;

    # SSL Konfiguration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Sicherheits-Header
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/buranto_access.log;
    error_log  /var/log/nginx/buranto_error.log;

    # Dateiuploads bis 50MB erlauben
    client_max_body_size 50M;

    # Proxy zum Intranet-Container
    location / {
        proxy_pass http://intranet:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts für lange API-Aufrufe
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;
    }

    # Statische Assets cachen
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        proxy_pass http://intranet:5000;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
